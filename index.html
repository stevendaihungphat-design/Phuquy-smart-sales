<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nội Thất Tín Vũ 2 - Đồ Gỗ Phú Quý</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; text-align: center; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0,1); }
        h2 { color: #8B4513; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #8B4513; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #A0522D; }
    </style>
</head>
<body>

<div class="container">
    <h2>ĐỒ GỖ PHÚ QUÝ</h2>
    <p>Vui lòng nhập thông tin khách hàng</p>
    <form id="customerForm">
        <input type="text" id="name" name="name" placeholder="Họ và tên khách hàng" required>
        <input type="tel" id="phone" name="phone" placeholder="Số điện thoại" required>
        <input type="text" id="address" name="address" placeholder="Địa chỉ bàn giao" required>
        <button type="submit" id="submitBtn">GỬI THÔNG TIN</button>
    </form>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxvJl9DvPh7XFQI2xrrdsJbc5qMPfahMrE8LcKXYkdOjlz--I73eMyh5yS15hz-6JOb/exec";

    document.getElementById('customerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "ĐANG GỬI...";
        submitBtn.disabled = true;

        const formData = new FormData(this);
        const data = {};
        formData.forEach((value, key) => data[key] = value);

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            alert('Gửi thông tin thành công lên Google Sheets!');
            document.getElementById('customerForm').reset();
        })
        .catch(error => {
            alert('Có lỗi xảy ra, vui lòng thử lại!');
            console.error(error);
        })
        .finally(() => {
            submitBtn.innerText = "GỬI THÔNG TIN";
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
